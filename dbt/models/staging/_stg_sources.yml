version: 2

sources:
  - name: hydromancer
    description: >
      Hydromancer Reservoir — public Hyperliquid on-chain dataset stored as
      Parquet in s3://hydromancer-reservoir (ap-northeast-1, requester-pays).
      The S3 secret is created by the on-run-start hook in dbt_project.yml.
    tables:
      - name: xyz_perp_fills
        description: >
          xyz dex perp fills (by_dex/xyz/fills/perp/all), one Parquet file per
          UTC day under date=YYYY-MM-DD hive partitions. Grain is one row per
          counterparty side of a trade, so trade_id appears twice (maker + taker).
        meta:
          external_location: >-
            read_parquet('s3://hydromancer-reservoir/by_dex/xyz/fills/perp/all/date=*/fills.parquet',
            hive_partitioning = true)
      - name: xyz_perp_snapshots
        description: >
          xyz dex end-of-block perp position snapshots
          (by_dex/xyz/snapshots/perp), one row per (user, market) per snapshot.
          A day can have multiple snapshot files (block_timestamp in the
          filename); staging keeps the latest per day. filename is exposed so
          staging can dedupe to the latest snapshot.
        meta:
          external_location: >-
            read_parquet('s3://hydromancer-reservoir/by_dex/xyz/snapshots/perp/date=*/*.parquet',
            hive_partitioning = true, filename = true)
