name: xyz_analytics
version: '1.0.0'
config-version: 2

profile: xyz_analytics

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

on-run-start:
  - "CREATE OR REPLACE PERSISTENT SECRET hydro (TYPE s3, PROVIDER credential_chain, REGION 'ap-northeast-1');"

models:
  xyz_analytics:
    staging:
      +materialized: incremental
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
